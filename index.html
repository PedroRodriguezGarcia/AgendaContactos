<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agenda de Contactos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="header">
    <h1>Agenda de Contactos</h1>
    <p>Gestiona tus contactos</p>
  </header>

  <main>
    <section class="bloque">
      <form id="contactForm" class="form">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="nombre">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="telefono">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>
        <div class="form-group">
          <label>Etiquetas</label>
          <input type="text" id="etiquetas">
        </div>
        <button type="submit" class="btn">Añadir contacto</button>
      </form>
      <p id="mensaje" class="mensaje"></p>
    </section>

    <section class="bloque top-bar">
      <input type="text" id="busqueda" placeholder="Buscar contacto...">
     
    </section>

    <section id="listaContactos" class="grid"></section>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
